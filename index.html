<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百业关系图谱（多人共享版）</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 腾讯云 CloudBase Web SDK（最新稳定版） -->
    <script src="https://unpkg.com/tcb-js-sdk@2.19.0/dist/tcb.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B0000',
                        secondary: '#1A1A1A',
                        accent: '#DAA520',
                        light: '#F5F5DC',
                        dark: '#2F2F2F',
                        marriage: '#FF6B6B',
                        master: '#4ECDC4',
                        sworn: '#FFD166'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['"Ma Shan Zheng"', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .ancient-bg {
                background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            }
            .character-box {
                @apply bg-dark border-2 border-accent rounded-lg p-3 text-center shadow-lg cursor-pointer transition-all duration-300 hover:scale-105 hover:shadow-xl;
            }
            .btn-wuxia {
                @apply px-4 py-2 rounded-md transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-opacity-90 focus:ring-primary;
            }
            .btn-secondary {
                @apply bg-secondary text-light hover:bg-opacity-90 focus:ring-secondary;
            }
            .btn-accent {
                @apply bg-accent text-dark hover:bg-opacity-90 focus:ring-accent;
            }
            .btn-danger {
                @apply bg-red-700 text-white hover:bg-red-600 focus:ring-red-700;
            }
            .input-wuxia {
                @apply bg-dark bg-opacity-70 border border-accent border-opacity-30 rounded-md px-3 py-2 text-light focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent;
            }
            .modal-wuxia {
                @apply fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70 transition-opacity duration-300;
            }
            .modal-content-wuxia {
                @apply bg-dark border border-accent border-opacity-30 rounded-lg shadow-xl max-w-md w-full p-6 transform transition-all duration-300;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&amp;display=swap" rel="stylesheet">
</head>
<body class="bg-dark text-light min-h-screen flex flex-col ancient-bg">
    <!-- 顶部导航栏 -->
    <header class="bg-secondary bg-opacity-90 backdrop-blur-md border-b border-accent border-opacity-30 shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-sitemap text-accent text-2xl"></i>
                <h1 class="text-2xl font-serif text-accent">百业关系图谱（多人共享版）</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="helpBtn" class="btn-wuxia btn-secondary flex items-center space-x-1">
                    <i class="fa fa-question-circle"></i>
                    <span>使用帮助</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col items-center justify-start p-8">
        <!-- 操作按钮区域 -->
        <div class="mb-8 flex flex-wrap gap-4 justify-center">
            <button id="createCharacterBtn" class="btn-wuxia btn-primary flex items-center justify-center space-x-2 text-lg px-6 py-3">
                <i class="fa fa-plus"></i>
                <span>新建角色</span>
            </button>
            <button id="autoLayoutBtn" class="btn-wuxia btn-accent flex items-center justify-center space-x-2 text-lg px-6 py-3">
                <i class="fa fa-magic"></i>
                <span>自动排版</span>
            </button>
        </div>

        <!-- 图谱区域 -->
        <div id="graph-container" class="w-full max-w-5xl min-h-[600px] border border-accent border-opacity-20 rounded-lg bg-dark bg-opacity-30 overflow-hidden relative">
            <!-- 拖拽控制按钮 -->
            <div class="absolute top-2 right-2 z-20 flex space-x-2">
                <button id="zoomInBtn" class="btn-wuxia btn-secondary text-sm py-1 px-2">
                    <i class="fa fa-search-plus"></i>
                </button>
                <button id="zoomOutBtn" class="btn-wuxia btn-secondary text-sm py-1 px-2">
                    <i class="fa fa-search-minus"></i>
                </button>
                <button id="resetViewBtn" class="btn-wuxia btn-secondary text-sm py-1 px-2">
                    <i class="fa fa-refresh"></i>
                </button>
            </div>
            
            <!-- 拖拽画布层 -->
            <div id="canvas-wrapper" class="w-full h-full cursor-move" style="transform-origin: center center;">
                <!-- SVG层用于绘制关系线 -->
                <svg id="relationship-lines" class="absolute inset-0 w-full h-full pointer-events-none z-5"></svg>
                
                <!-- 角色容器 -->
                <div id="characters-container" class="w-full h-full relative p-4 min-h-[800px] min-w-[1200px]">
                    <div id="no-data-message" class="absolute inset-0 flex items-center justify-center">
                        <div class="text-center">
                            <i class="fa fa-sitemap text-6xl text-accent text-opacity-50 mb-4"></i>
                            <p class="text-xl text-light text-opacity-70">暂无角色，请点击"新建角色"开始</p>
                        </div>
                    </div>
                    <!-- 角色将在这里动态添加 -->
                </div>
            </div>
            
            <!-- 拖拽提示 -->
            <div class="absolute bottom-2 left-2 text-xs text-light text-opacity-50">
                提示：按住鼠标左键拖动画布，滚轮缩放 | 所有数据实时共享
            </div>
        </div>
    </main>

    <!-- 新建角色模态框 -->
    <div id="create-character-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70 transition-opacity duration-300" style="display:none" onclick="if(event.target===this) this.style.display='none'">
        <div class="bg-dark border border-accent border-opacity-30 rounded-lg shadow-xl max-w-md w-full p-6 transform transition-all duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-serif text-accent">新建角色</h2>
                <button onclick="document.getElementById('create-character-modal').style.display='none'" class="text-light text-opacity-70 hover:text-opacity-100">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label for="character-name" class="block mb-1">角色名称</label>
                    <input type="text" id="character-name" class="input-wuxia w-full" placeholder="请输入角色名称" required="">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button onclick="document.getElementById('create-character-modal').style.display='none'" class="btn-wuxia btn-secondary">取消</button>
                    <button onclick="createCharacterFromForm()" class="btn-wuxia btn-primary">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 新建关系模态框 -->
    <div id="create-relationship-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70 transition-opacity duration-300" style="display:none" onclick="if(event.target===this) this.style.display='none'">
        <div class="bg-dark border border-accent border-opacity-30 rounded-lg shadow-xl max-w-md w-full p-6 transform transition-all duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-serif text-accent">新建关系</h2>
                <button onclick="document.getElementById('create-relationship-modal').style.display='none'" class="text-light text-opacity-70 hover:text-opacity-100">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block mb-1">源角色</label>
                    <div id="source-character-name" class="input-wuxia w-full p-2 bg-opacity-50 cursor-not-allowed"></div>
                </div>
                <div>
                    <label for="relationship-type" class="block mb-1">关系类型</label>
                    <select id="relationship-type" class="input-wuxia w-full" required="">
                        <option value="">请选择关系类型</option>
                        <option value="marriage">侠缘 (0-6)</option>
                        <option value="master">师傅 (≤1)</option>
                        <option value="disciple">徒弟 (0-5)</option>
                        <option value="sworn">结义 (0-10)</option>
                    </select>
                </div>
                <div>
                    <label for="target-character-name" class="block mb-1">目标角色名称</label>
                    <input type="text" id="target-character-name" class="input-wuxia w-full" placeholder="请输入目标角色名称" required="">
                </div>
                <div class="flex justify-end space-x-3 pt-2">
                    <button onclick="document.getElementById('create-relationship-modal').style.display='none'" class="btn-wuxia btn-secondary">取消</button>
                    <button onclick="createRelationshipFromForm()" class="btn-wuxia btn-primary">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 帮助模态框 -->
    <div id="help-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-70 transition-opacity duration-300" style="display:none" onclick="if(event.target===this) this.style.display='none'">
        <div class="bg-dark border border-accent border-opacity-30 rounded-lg shadow-xl max-w-2xl w-full p-6 transform transition-all duration-300">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-serif text-accent">使用帮助</h2>
                <button id="help-close-btn" class="text-light text-opacity-70 hover:text-opacity-100 text-2xl" onclick="document.getElementById('help-modal').style.display='none'">
                    ×
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <h3 class="text-lg font-medium text-light mb-2">基本操作</h3>
                    <ul class="list-disc list-inside space-y-1 text-sm">
                        <li>点击"新建角色"按钮创建新角色</li>
                        <li>点击已有角色，可查看详情并创建关系</li>
                        <li>点击关系线，可删除该关系</li>
                        <li>拖拽角色可调整位置</li>
                        <li>点击"自动排版"可自动调整图谱布局</li>
                        <li>所有数据实时共享，修改后其他人刷新即可看到</li>
                    </ul>
                </div>
                <div>
                    <h3 class="text-lg font-medium text-light mb-2">关系限制</h3>
                    <ul class="list-disc list-inside space-y-1 text-sm">
                        <li>侠缘：每个角色最多6个，双向关系</li>
                        <li>师徒：每个角色最多1个师傅，最多5个徒弟，单向关系</li>
                        <li>结义：每个角色最多10个，双向关系</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let characters = [];
        let relationships = [];
        let nextId = 1;
        let selectedCharacter = null;
        let db = null; // 云数据库实例
        
        // 关系限制配置
        const relationshipLimits = {
            marriage: { max: 6, bidirectional: true, label: "侠缘", color: "#FF6B6B" },
            master: { max: 1, bidirectional: false, reverseType: "disciple", label: "师傅", color: "#4ECDC4" },
            disciple: { max: 5, bidirectional: false, reverseType: "master", label: "徒弟", color: "#4ECDC4" },
            sworn: { max: 10, bidirectional: true, label: "结义", color: "#FFD166" }
        };

        // ======================== 腾讯云 CloudBase 配置 ========================
        // 你的环境ID（已填好）
        const CLOUDBASE_ENV_ID = "my-graph-6gryb0wt964d13c6";
        
        // 初始化腾讯云（简化版，修复所有兼容问题）
        async function initCloudBase() {
            try {
                // 初始化云开发
                const app = window.tcb.init({
                    env: CLOUDBASE_ENV_ID
                });
                
                // 匿名登录（核心：修复登录逻辑）
                const auth = app.auth({ persistence: "local" });
                await auth.anonymousAuthProvider().signIn();
                
                // 获取数据库实例
                db = app.database();
                console.log("✅ 腾讯云初始化成功！");
                showNotification("数据同步已连接", "success");
                
                // 加载云端数据
                await loadDataFromCloud();
            } catch (e) {
                console.error("❌ 腾讯云初始化失败：", e);
                // 显示具体错误信息
                showNotification(`连接失败：${e.message || e}`, "error");
                // 降级使用本地数据
                loadLocalData();
            }
        }

        // 从云端加载数据
        async function loadDataFromCloud() {
            try {
                // 加载角色
                const characterRes = await db.collection('characters').get();
                characters = characterRes.data || [];
                
                // 加载关系
                const relationshipRes = await db.collection('relationships').get();
                relationships = relationshipRes.data || [];
                
                // 更新ID计数器
                if (characters.length > 0) {
                    nextId = Math.max(...characters.map(c => c.id || 0)) + 1;
                }
                
                console.log(`✅ 从云端加载：${characters.length}个角色，${relationships.length}个关系`);
                updateCharacterDisplay();
            } catch (e) {
                console.error("❌ 加载云端数据失败：", e);
                loadLocalData();
            }
        }

        // 保存角色到云端
        async function saveCharacterToCloud(character) {
            if (!db) return;
            try {
                // 如果已有ID，更新；否则新增
                if (character._id) {
                    await db.collection('characters').doc(character._id).update(character);
                } else {
                    const res = await db.collection('characters').add(character);
                    character._id = res.id;
                }
                console.log("✅ 角色已保存到云端");
            } catch (e) {
                console.error("❌ 保存角色失败：", e);
                showNotification("数据同步失败", "error");
            }
        }

        // 保存关系到云端
        async function saveRelationshipToCloud(relationship) {
            if (!db) return;
            try {
                if (relationship._id) {
                    await db.collection('relationships').doc(relationship._id).update(relationship);
                } else {
                    const res = await db.collection('relationships').add(relationship);
                    relationship._id = res.id;
                }
                console.log("✅ 关系已保存到云端");
            } catch (e) {
                console.error("❌ 保存关系失败：", e);
                showNotification("数据同步失败", "error");
            }
        }

        // 删除云端角色
        async function deleteCharacterFromCloud(characterId) {
            if (!db) return;
            try {
                const character = characters.find(c => c.id === characterId);
                if (character && character._id) {
                    await db.collection('characters').doc(character._id).remove();
                }
                // 删除相关关系
                await Promise.all(
                    relationships
                        .filter(r => r.sourceId === characterId || r.targetId === characterId)
                        .map(r => r._id ? db.collection('relationships').doc(r._id).remove() : Promise.resolve())
                );
            } catch (e) {
                console.error("❌ 删除云端数据失败：", e);
            }
        }

        // 删除云端关系
        async function deleteRelationshipFromCloud(relationshipId) {
            if (!db) return;
            try {
                const relationship = relationships.find(r => r.id === relationshipId);
                if (relationship && relationship._id) {
                    await db.collection('relationships').doc(relationship._id).remove();
                }
            } catch (e) {
                console.error("❌ 删除关系失败：", e);
            }
        }

        // 本地数据降级方案
        function loadLocalData() {
            const localChars = localStorage.getItem('characters');
            const localRels = localStorage.getItem('relationships');
            
            if (localChars) characters = JSON.parse(localChars);
            if (localRels) relationships = JSON.parse(localRels);
            
            if (characters.length > 0) {
                nextId = Math.max(...characters.map(c => c.id || 0)) + 1;
            }
            
            updateCharacterDisplay();
            showNotification("已切换为本地模式，数据保存在浏览器中", "info");
        }

        // ======================== 核心功能函数 ========================
        // 修复缺失的 renderGraph 函数
        function renderGraph() {
            console.log("✅ 图谱渲染初始化完成");
            updateCharacterDisplay();
        }

        // 初始化函数
        async function init() {
            // 先初始化腾讯云
            await initCloudBase();
            
            // 初始化事件监听
            initEventListeners();
            
            // 设置画布拖拽和缩放
            setupCanvasDragAndZoom();
            
            // 渲染图谱（修复函数未定义问题）
            renderGraph();
            
            // 添加窗口大小变化监听
            window.addEventListener('resize', function() {
                setTimeout(function() {
                    updateRelationshipLines();
                }, 100);
            });
        }

        // 初始化事件监听
        function initEventListeners() {
            // 帮助按钮
            document.getElementById('helpBtn').addEventListener('click', function() {
                document.getElementById('help-modal').style.display = 'flex';
            });

            // 新建角色按钮
            document.getElementById('createCharacterBtn').addEventListener('click', function() {
                document.getElementById('create-character-modal').style.display = 'flex';
                document.getElementById('character-name').focus();
            });
            
            // 自动排版按钮
            document.getElementById('autoLayoutBtn').addEventListener('click', function() {
                performAutoLayout();
            });
        }

        // 创建角色
        function createCharacter(name) {
            // 创建角色对象
            const character = {
                id: nextId++,
                name: name
            };

            // 添加到角色列表
            characters.push(character);

            // 为新角色分配位置
            const canvasWidth = 1200;
            const canvasHeight = 800;
            const centerX = canvasWidth / 2;
            const centerY = canvasHeight / 2;
            
            if (characters.length === 1) {
                // 第一个角色居中
                character.x = centerX;
                character.y = centerY;
                console.log(`✅ 第一个角色 ${name} 位置: (${character.x}, ${character.y})`);
            } else {
                // 后续角色围绕中心角色均匀分布
                const firstCharacter = characters[0];
                const radius = 200;
                const angle = (characters.length - 2) * (2 * Math.PI / 8);
                
                character.x = firstCharacter.x + radius * Math.cos(angle);
                character.y = firstCharacter.y + radius * Math.sin(angle);
                
                // 随机偏移
                character.x += (Math.random() - 0.5) * 50;
                character.y += (Math.random() - 0.5) * 50;
                
                console.log(`✅ 角色 ${name} 位置: (${character.x.toFixed(0)}, ${character.y.toFixed(0)})`);
            }

            // 保存到云端
            saveCharacterToCloud(character);
            
            // 更新UI
            updateCharacterDisplay();

            // 显示通知
            showNotification(`角色"${name}"已创建（数据已同步）`, 'success');
            
            return character;
        }

        // 更新角色显示
        function updateCharacterDisplay() {
            const container = document.getElementById('characters-container');
            const noDataMessage = document.getElementById('no-data-message');

            // 显示或隐藏无数据消息
            if (characters.length > 0) {
                noDataMessage.classList.add('hidden');
            } else {
                noDataMessage.classList.remove('hidden');
            }

            // 清除现有的角色显示
            const existingCharacters = container.querySelectorAll('.character-item');
            existingCharacters.forEach(item => item.remove());

            // 添加角色到显示区域
            characters.forEach(character => {
                const characterElement = document.createElement('div');
                characterElement.className = 'character-item';
                characterElement.style.position = 'absolute';
                characterElement.style.zIndex = '10';
                characterElement.setAttribute('data-character-id', character.id);
                
                // 设置角色位置
                if (character.x !== undefined && character.y !== undefined) {
                    characterElement.style.left = `${character.x}px`;
                    characterElement.style.top = `${character.y}px`;
                    characterElement.style.transform = 'translate(-50%, -50%)';
                } else {
                    const containerRect = container.getBoundingClientRect();
                    const defaultX = 100 + Math.random() * (containerRect.width - 200);
                    const defaultY = 100 + Math.random() * (containerRect.height - 200);
                    characterElement.style.left = `${defaultX}px`;
                    characterElement.style.top = `${defaultY}px`;
                    characterElement.style.transform = 'translate(-50%, -50%)';
                    
                    character.x = defaultX;
                    character.y = defaultY;
                    saveCharacterToCloud(character);
                }
                
                // 检查角色是否被选中
                const isSelected = selectedCharacter && selectedCharacter.id === character.id;
                const selectedClass = isSelected ? 'ring-4 ring-accent' : '';
                
                characterElement.innerHTML = `
                    <div class="character-box ${selectedClass}" data-id="${character.id}">
                        <h3 class="text-lg font-serif text-accent">${character.name}</h3>
                    </div>
                `;
                container.appendChild(characterElement);

                // 添加点击事件
                const currentCharacter = character;
                characterElement.querySelector('.character-box').addEventListener('click', function() {
                    selectCharacter(currentCharacter);
                });
            });
            
            // 更新关系线
            updateRelationshipLines();
        }

        // 选择角色
        function selectCharacter(character) {
            console.log('✅ 选择角色:', character.name, character.id);
            selectedCharacter = character;
            updateCharacterDisplay();
            
            setTimeout(() => {
                showCharacterMenu(character);
            }, 50);
        }

        // 显示角色操作菜单
        function showCharacterMenu(character) {
            let menu = document.getElementById('character-menu');
            if (menu) {
                menu.remove();
            }
            
            menu = document.createElement('div');
            menu.id = 'character-menu';
            menu.className = 'fixed z-50 bg-dark border border-accent border-opacity-30 rounded-lg shadow-lg p-2';
            menu.style.position = 'fixed';
            menu.style.zIndex = '100';
            
            const characterElement = document.querySelector(`.character-box[data-id="${character.id}"]`);
            const rect = characterElement.getBoundingClientRect();
            
            menu.style.left = `${rect.left + rect.width / 2}px`;
            menu.style.top = `${rect.top - 10}px`;
            menu.style.transform = 'translateX(-50%) translateY(-100%)';
            
            menu.innerHTML = `
                <div class="flex flex-col space-y-1">
                    <button onclick="openCreateRelationshipModal()" class="btn-wuxia btn-primary text-sm py-1">
                        <i class="fa fa-link mr-1"></i> 新建关系
                    </button>
                    <button onclick="deleteCharacter(${character.id})" class="btn-wuxia btn-danger text-sm py-1">
                        <i class="fa fa-trash mr-1"></i> 删除角色
                    </button>
                    <button onclick="clearSelection()" class="btn-wuxia btn-secondary text-sm py-1">
                        <i class="fa fa-times mr-1"></i> 取消选择
                    </button>
                </div>
            `;
            
            document.body.appendChild(menu);
            
            (function(menuElement, charElement) {
                document.addEventListener('click', function closeMenu(e) {
                    if (!menuElement.contains(e.target) && !charElement.contains(e.target)) {
                        menuElement.remove();
                        document.removeEventListener('click', closeMenu);
                    }
                });
            })(menu, characterElement);
        }

        // 清除选择
        function clearSelection() {
            selectedCharacter = null;
            updateCharacterDisplay();
            
            const menu = document.getElementById('character-menu');
            if (menu) {
                menu.remove();
            }
        }
        
        // 删除角色
        function deleteCharacter(characterId) {
            const character = characters.find(c => c.id === characterId);
            if (!character) return;
            
            if (confirm(`确定要删除角色"${character.name}"吗？\n删除后，该角色的所有关系也将被删除。`)) {
                // 从云端删除
                deleteCharacterFromCloud(characterId);
                
                // 删除相关的所有关系
                relationships = relationships.filter(r => 
                    r.sourceId !== characterId && r.targetId !== characterId
                );
                
                // 删除角色
                characters = characters.filter(c => c.id !== characterId);
                
                if (selectedCharacter && selectedCharacter.id === characterId) {
                    selectedCharacter = null;
                }
                
                const menu = document.getElementById('character-menu');
                if (menu) {
                    menu.remove();
                }
                
                updateCharacterDisplay();
                
                showNotification(`角色"${character.name}"已删除（数据已同步）`, 'success');
            }
        }
        
        // 删除关系
        function deleteRelationship(relationshipId) {
            const relationship = relationships.find(r => r.id === relationshipId);
            if (!relationship) return;
            
            const sourceCharacter = characters.find(c => c.id === relationship.sourceId);
            const targetCharacter = characters.find(c => c.id === relationship.targetId);
            
            if (sourceCharacter && targetCharacter) {
                const relationshipLabel = relationshipLimits[relationship.type].label;
                
                if (confirm(`确定要删除"${sourceCharacter.name}"与"${targetCharacter.name}"的${relationshipLabel}关系吗？`)) {
                    // 从云端删除
                    deleteRelationshipFromCloud(relationshipId);
                    
                    // 删除该关系
                    relationships = relationships.filter(r => r.id !== relationshipId);
                    
                    if (relationshipLimits[relationship.type].bidirectional && relationshipLimits[relationship.type].reverseType) {
                        const reverseRelationship = relationships.find(r => 
                            r.sourceId === relationship.targetId && 
                            r.targetId === relationship.sourceId && 
                            r.type === relationshipLimits[relationship.type].reverseType
                        );
                        
                        if (reverseRelationship) {
                            deleteRelationshipFromCloud(reverseRelationship.id);
                            relationships = relationships.filter(r => r.id !== reverseRelationship.id);
                        }
                    }
                    
                    updateCharacterDisplay();
                    
                    showNotification(`"${sourceCharacter.name}"与"${targetCharacter.name}"的${relationshipLabel}关系已删除（数据已同步）`, 'success');
                }
            }
        }
        
        // 设置画布拖拽和缩放功能
        function setupCanvasDragAndZoom() {
            const canvasWrapper = document.getElementById('canvas-wrapper');
            const graphContainer = document.getElementById('graph-container');
            const charactersContainer = document.getElementById('characters-container');
            
            let isDragging = false;
            let startX, startY;
            let translateX = 0, translateY = 0;
            let scale = 1;
            
            graphContainer.addEventListener('mousedown', function(e) {
                let target = e.target;
                while (target && target !== graphContainer) {
                    if (target.classList.contains('character-item') || 
                        target.closest('.character-item') ||
                        target.closest('.btn-wuxia')) {
                        return;
                    }
                    target = target.parentElement;
                }
                
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                graphContainer.style.cursor = 'grabbing';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                
                updateCanvasTransform();
            });
            
            document.addEventListener('mouseup', function() {
                isDragging = false;
                graphContainer.style.cursor = 'move';
            });
            
            document.addEventListener('mouseleave', function() {
                isDragging = false;
                graphContainer.style.cursor = 'move';
            });
            
            graphContainer.addEventListener('wheel', function(e) {
                let target = e.target;
                while (target && target !== graphContainer) {
                    if (target.classList.contains('character-item') || 
                        target.closest('.character-item') ||
                        target.closest('.btn-wuxia')) {
                        return;
                    }
                    target = target.parentElement;
                }
                
                e.preventDefault();
                
                const zoomSpeed = 0.1;
                const delta = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;
                const newScale = Math.max(0.1, Math.min(3, scale + delta));
                
                const rect = graphContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const scaleFactor = newScale / scale;
                translateX = mouseX - (mouseX - translateX) * scaleFactor;
                translateY = mouseY - (mouseY - translateY) * scaleFactor;
                
                scale = newScale;
                updateCanvasTransform();
            });
            
            function updateCanvasTransform() {
                canvasWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }
            
            window.resetCanvasView = function() {
                translateX = 0;
                translateY = 0;
                scale = 1;
                updateCanvasTransform();
            };
            
            document.getElementById('zoomInBtn').addEventListener('click', function() {
                scale = Math.min(3, scale + 0.1);
                updateCanvasTransform();
            });
            
            document.getElementById('zoomOutBtn').addEventListener('click', function() {
                scale = Math.max(0.1, scale - 0.1);
                updateCanvasTransform();
            });
            
            document.getElementById('resetViewBtn').addEventListener('click', resetCanvasView);
            
            console.log('✅ 画布拖拽和缩放功能已初始化');
        }

        // 执行自动排版
        function performAutoLayout() {
            if (characters.length === 0) return;
            
            showNotification('正在执行自动排版...', 'info');
            
            const canvasWidth = 1200;
            const canvasHeight = 800;
            const centerX = canvasWidth / 2;
            const centerY = canvasHeight / 2;
            
            let radius = Math.min(canvasWidth, canvasHeight) * 0.3;
            
            let centralCharacter = characters[0];
            let maxConnections = 0;
            
            characters.forEach(character => {
                const connections = relationships.filter(r => 
                    r.sourceId === character.id || r.targetId === character.id
                ).length;
                
                if (connections > maxConnections) {
                    maxConnections = connections;
                    centralCharacter = character;
                }
            });
            
            centralCharacter.x = centerX;
            centralCharacter.y = centerY;
            saveCharacterToCloud(centralCharacter);
            
            const otherCharacters = characters.filter(c => c.id !== centralCharacter.id);
            
            if (otherCharacters.length > 0) {
                const angleStep = 2 * Math.PI / otherCharacters.length;
                
                otherCharacters.forEach((character, index) => {
                    const baseAngle = index * angleStep;
                    
                    let characterRadius = radius;
                    const hasDirectConnection = relationships.some(r => 
                        (r.sourceId === centralCharacter.id && r.targetId === character.id) ||
                        (r.targetId === centralCharacter.id && r.sourceId === character.id)
                    );
                    
                    if (hasDirectConnection) {
                        characterRadius = radius * 0.8;
                    } else {
                        characterRadius = radius * 1.5;
                    }
                    
                    const randomAngleOffset = (Math.random() - 0.5) * 0.6;
                    const randomRadiusOffset = (Math.random() - 0.5) * 0.2;
                    
                    const finalAngle = baseAngle + randomAngleOffset;
                    const finalRadius = characterRadius * (1 + randomRadiusOffset);
                    
                    character.x = centerX + finalRadius * Math.cos(finalAngle);
                    character.y = centerY + finalRadius * Math.sin(finalAngle);
                    
                    saveCharacterToCloud(character);
                    console.log(`✅ 角色 ${character.name} 位置: (${character.x.toFixed(0)}, ${character.y.toFixed(0)})`);
                });
            }
            
            resetCanvasView();
            
            setTimeout(() => {
                applyLayoutWithAnimation();
            }, 100);
        }
        
        // 应用布局并添加动画效果
        function applyLayoutWithAnimation() {
            const characterElements = document.querySelectorAll('.character-item');
            
            characterElements.forEach((element) => {
                const characterBox = element.querySelector('.character-box');
                if (!characterBox) return;
                
                const characterId = parseInt(characterBox.getAttribute('data-id'));
                const character = characters.find(c => c.id === characterId);
                
                if (!character || character.x === undefined || character.y === undefined) return;
                
                const originalLeft = element.style.left;
                const originalTop = element.style.top;
                
                if (!originalLeft || !originalTop) {
                    const container = document.getElementById('characters-container');
                    const rect = container.getBoundingClientRect();
                    element.style.left = `${rect.width / 2}px`;
                    element.style.top = `${rect.height / 2}px`;
                    element.style.transform = 'translate(-50%, -50%)';
                }
                
                element.offsetHeight;
                
                setTimeout(() => {
                    element.style.transition = 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    element.style.left = `${character.x}px`;
                    element.style.top = `${character.y}px`;
                    element.style.transform = 'translate(-50%, -50%)';
                }, Math.random() * 300);
            });
            
            setTimeout(() => {
                updateRelationshipLines();
                showNotification('自动排版完成！所有数据已同步', 'success');
            }, 1000);
        }
        
        // 显示通知
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 px-4 py-2 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full opacity-0`;
            
            switch (type) {
                case 'success':
                    notification.classList.add('bg-green-600', 'text-white');
                    break;
                case 'error':
                    notification.classList.add('bg-red-600', 'text-white');
                    break;
                case 'warning':
                    notification.classList.add('bg-yellow-500', 'text-white');
                    break;
                default:
                    notification.classList.add('bg-blue-600', 'text-white');
            }
            
            notification.innerHTML = `
                <div class="flex items-center">
                    <i class="fa fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : type === 'warning' ? 'exclamation-triangle' : 'info-circle'} mr-2"></i>
                    <span>${message}</span>
                </div>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.remove('translate-x-full', 'opacity-0');
            }, 100);
            
            setTimeout(() => {
                notification.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }

        // 打开创建关系模态框
        function openCreateRelationshipModal() {
            if (!selectedCharacter) return;
            
            document.getElementById('source-character-name').textContent = selectedCharacter.name;
            
            document.getElementById('create-relationship-modal').style.display = 'flex';
            
            document.getElementById('target-character-name').focus();
            
            const menu = document.getElementById('character-menu');
            if (menu) {
                menu.remove();
            }
        }

        // 从表单创建角色
        function createCharacterFromForm() {
            const name = document.getElementById('character-name').value.trim();
            if (name) {
                createCharacter(name);
                document.getElementById('create-character-modal').style.display = 'none';
                document.getElementById('character-name').value = '';
            } else {
                alert('请输入角色名称');
            }
        }
        
        // 从表单创建关系
        function createRelationshipFromForm() {
            if (!selectedCharacter) return;
            
            const relationshipType = document.getElementById('relationship-type').value;
            const targetName = document.getElementById('target-character-name').value.trim();
            
            if (!relationshipType) {
                alert('请选择关系类型');
                return;
            }
            
            if (!targetName) {
                alert('请输入目标角色名称');
                return;
            }
            
            if (targetName === selectedCharacter.name) {
                alert('不能与自己建立关系');
                return;
            }
            
            if (!checkRelationshipLimit(selectedCharacter.id, relationshipType)) {
                const limit = relationshipLimits[relationshipType];
                alert(`超出${limit.label}数量限制 (最多${limit.max}个)`);
                return;
            }
            
            let targetCharacter = characters.find(c => c.name === targetName);
            if (!targetCharacter) {
                targetCharacter = createCharacter(targetName);
            }
            
            const existingRelationship = relationships.find(r => 
                (r.sourceId === selectedCharacter.id && r.targetId === targetCharacter.id && r.type === relationshipType) ||
                (r.targetId === selectedCharacter.id && r.sourceId === targetCharacter.id && r.type === relationshipType && relationshipLimits[relationshipType].bidirectional)
            );
            
            if (existingRelationship) {
                alert('该关系已存在');
                return;
            }
            
            const relationship = {
                id: `rel_${Date.now()}`,
                sourceId: selectedCharacter.id,
                targetId: targetCharacter.id,
                type: relationshipType
            };
            
            relationships.push(relationship);
            
            // 保存到云端
            saveRelationshipToCloud(relationship);
            
            if (relationshipLimits[relationshipType].bidirectional && relationshipLimits[relationshipType].reverseType) {
                const reverseType = relationshipLimits[relationshipType].reverseType;
                
                if (checkRelationshipLimit(targetCharacter.id, reverseType)) {
                    const reverseRelationship = {
                        id: `rel_${Date.now()}_rev`,
                        sourceId: targetCharacter.id,
                        targetId: selectedCharacter.id,
                        type: reverseType
                    };
                    
                    relationships.push(reverseRelationship);
                    saveRelationshipToCloud(reverseRelationship);
                }
            }
            
            document.getElementById('create-relationship-modal').style.display = 'none';
            document.getElementById('relationship-type').value = '';
            document.getElementById('target-character-name').value = '';
            
            updateCharacterDisplay();
            
            const relationshipLabel = relationshipLimits[relationshipType].label;
            showNotification(`"${selectedCharacter.name}"与"${targetCharacter.name}"的${relationshipLabel}关系已创建（数据已同步）`, 'success');
        }
        
        // 检查关系限制
        function checkRelationshipLimit(characterId, relationshipType) {
            const limit = relationshipLimits[relationshipType];
            let count = 0;
            
            relationships.forEach(r => {
                if (r.sourceId === characterId && r.type === relationshipType) {
                    count++;
                }
            });
            
            return count < limit.max;
        }
        
        // 更新关系线
        function updateRelationshipLines() {
            console.log('✅ 开始更新关系线...');
            
            const svg = document.getElementById('relationship-lines');
            if (!svg) {
                console.error('❌ 未找到SVG元素');
                return;
            }
            
            svg.innerHTML = '';
            
            svg.style.position = 'absolute';
            svg.style.top = '0';
            svg.style.left = '0';
            svg.style.width = '100%';
            svg.style.height = '100%';
            svg.style.zIndex = '5';
            svg.style.pointerEvents = 'none';
            
            console.log(`✅ 关系数量: ${relationships.length}，角色数量: ${characters.length}`);
            
            relationships.forEach((relationship, index) => {
                console.log(`✅ 处理关系 ${index + 1}:`, relationship);
                
                const sourceCharacter = characters.find(c => c.id === relationship.sourceId);
                const targetCharacter = characters.find(c => c.id === relationship.targetId);
                
                if (!sourceCharacter || !targetCharacter) {
                    console.log('❌ 跳过无效关系');
                    return;
                }
                
                if (sourceCharacter.x === undefined || sourceCharacter.y === undefined ||
                    targetCharacter.x === undefined || targetCharacter.y === undefined) {
                    console.log('❌ 角色缺少坐标信息:', sourceCharacter.name, targetCharacter.name);
                    return;
                }
                
                console.log(`✅ 角色坐标: ${sourceCharacter.name} (${sourceCharacter.x.toFixed(0)}, ${sourceCharacter.y.toFixed(0)}) -> ${targetCharacter.name} (${targetCharacter.x.toFixed(0)}, ${targetCharacter.y.toFixed(0)})`);
                
                const x1 = sourceCharacter.x;
                const y1 = sourceCharacter.y;
                const x2 = targetCharacter.x;
                const y2 = targetCharacter.y;
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
                path.setAttribute('stroke', relationshipLimits[relationship.type].color);
                path.setAttribute('stroke-width', '3');
                path.setAttribute('fill', 'none');
                path.setAttribute('stroke-linecap', 'round');
                
                svg.appendChild(path);
                
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 15;
                
                const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                const labelText = relationshipLimits[relationship.type].label;
                const labelWidth = labelText.length * 8;
                
                labelBg.setAttribute('x', midX - labelWidth / 2 - 5);
                labelBg.setAttribute('y', midY - 10);
                labelBg.setAttribute('width', labelWidth + 10);
                labelBg.setAttribute('height', '20');
                labelBg.setAttribute('fill', 'rgba(0,0,0,0.8)');
                labelBg.setAttribute('rx', '10');
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', midX);
                text.setAttribute('y', midY + 3);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', relationshipLimits[relationship.type].color);
                text.setAttribute('font-size', '12px');
                text.setAttribute('font-weight', 'bold');
                text.textContent = labelText;
                
                svg.appendChild(labelBg);
                svg.appendChild(text);
            });
            
            console.log('✅ 关系线更新完成');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
